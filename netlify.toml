[build]
  # Build command - installs and uses Bun
  command = "chmod +x netlify-build.sh && ./netlify-build.sh"
  
  # Directory where build output is located
  publish = "dist"
  
  # Environment variables
  [build.environment]
    NODE_VERSION = "20"
    # Tell build to use bash
    SHELL = "/bin/bash"
    # Skip Next.js plugin (this is a Vite project, not Next.js)
    NETLIFY_NEXT_PLUGIN_SKIP = "true"

# Redirect all requests to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: Set custom headers for better security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
